<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3ecf8e; --error: #f87171; --text: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center; width: 320px; border: 1px solid #334155; }
        button { width: 100%; padding: 14px; cursor: pointer; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 700; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.85rem; color: #94a3b8; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0">Identity Check</h2>
        <p style="font-size: 0.9rem; margin-bottom: 25px;">Verifying hardware credentials...</p>
        <button id="verifyBtn">Verify & Download</button>
        <div id="status">Ready</div>
    </div>

    <script>
        const API_URL = "https://questarchive-fshl.onrender.com/verify";

        document.getElementById('verifyBtn').onclick = async function() {
            const status = document.getElementById('status');
            this.disabled = true;
            status.innerText = "⏳ Connecting to Gateway...";

            try {
                // Generate Hardware Fingerprint
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const gpu = gl.getExtension('WEBGL_debug_renderer_info') ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Unknown";
                
                const raw = [navigator.userAgent, screen.width, navigator.hardwareConcurrency, gpu].join('|');
                const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
                const hardwareId = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hardware_id: hardwareId,
                        details: {
                            cpu: navigator.hardwareConcurrency,
                            gpu: gpu,
                            res: `${screen.width}x${screen.height}`,
                            lang: navigator.language,
                            ua: navigator.userAgent
                        }
                    })
                });

                const data = await response.json();

                if (data.status === 'allowed') {
                    status.innerHTML = "<span style='color:var(--accent)'>✅ Authorized! Downloading...</span>";
                    setTimeout(() => { window.location.href = data.download_url; }, 1000);
                } else {
                    status.innerHTML = `<span style='color:var(--error)'>❌ Denied: ${data.reason || 'Limit Reached'}</span>`;
                }

            } catch (err) {
                console.error(err);
                status.innerText = "⚠️ Gateway Timeout. Try again.";
            } finally {
                this.disabled = false;
            }
        };
    </script>
</body>
</html>
