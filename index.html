<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download Portal</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3ecf8e; --error: #f87171; --text: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; width: 340px; border: 1px solid #334155; }
        h2 { color: var(--accent); margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
        button { width: 100%; padding: 15px; cursor: pointer; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1rem; transition: 0.3s; }
        button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(62, 207, 142, 0.3); }
        button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.85rem; min-height: 40px; line-height: 1.5; }
        .loader { display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>Identity Verified</h2>
        <p>Finalizing your secure cloud link...</p>
        <button id="dlBtn">Download Payload</button>
        <div id="status">Ready</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS with your current ngrok URL (ensure it includes /verify at the end)
        const API_URL = "https://reginald-enginous-karine.ngrok-free.dev/verify";

        document.getElementById('dlBtn').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerHTML = '<span class="loader"></span>Performing Handshake...';

            try {
                // 1. Hardware Fingerprinting
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
                const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Generic GPU";
                
                const rawData = [navigator.userAgent, screen.width + 'x' + screen.height, navigator.hardwareConcurrency, gpu].join('|');
                const encoder = new TextEncoder();
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(rawData));
                const hardwareId = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

                // 2. Gateway Request
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // CRITICAL: Bypasses the ngrok 405 error
                    },
                    body: JSON.stringify({
                        hardware_id: hardwareId,
                        details: {
                            cpu: navigator.hardwareConcurrency || 0,
                            gpu: gpu,
                            res: `${screen.width}x${screen.height}`,
                            lang: navigator.language,
                            ua: navigator.userAgent
                        }
                    })
                });

                // 3. Handle Response
                if (response.status === 405) {
                    throw new Error("405: Method Not Allowed. Check your ngrok path.");
                }

                const data = await response.json();

                if (data.status === 'allowed') {
                    status.innerHTML = `<span style="color:var(--accent)">✅ Authorized!</span><br>Redirecting...`;
                    setTimeout(() => { window.location.href = data.download_url; }, 1200);
                } else {
                    status.innerHTML = `<span style="color:var(--error)">🚫 Access Denied</span><br>${data.reason || 'Limit Reached'}`;
                }

            } catch (err) {
                console.error("Gateway Connection Error:", err);
                status.innerHTML = `<span style="color:var(--error)">⚠️ Connection Failed</span><br>Check server terminal.`;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
